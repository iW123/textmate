name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          brew --version
          brew --prefix

      - name: Install dependencies
        run: |
          brew install \
            boost \
            capnp \
            google-sparsehash \
            multimarkdown \
            ninja \
            ragel

      - name: Configure
        run: ./configure

      - name: Build
        run: |
          ninja -j$(sysctl -n hw.logicalcpu) TextMate

      # =========================
      # Debug (关键修复)
      # =========================
      - name: Debug output
        run: |
          echo "==== find .app ===="
          find . -maxdepth 10 -name "*.app"

          echo "==== find TextMate ===="
          find . -maxdepth 10 -name "*TextMate*"

          echo "==== build tree ===="
          ls -R build || true

      - name: Create DMG
        run: |
          brew install create-dmg

          APP_PATH=$(find . -maxdepth 10 -name "TextMate.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No TextMate.app found, cannot create dmg"
            exit 1
          fi

          mkdir -p dist
          cp -R "$APP_PATH" dist/

          create-dmg \
            --volname "TextMate" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "TextMate.dmg" \
            "dist/"

      # =========================
      # Upload artifact (修复核心)
      # =========================
      - name: Upload TextMate artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextMate
          path: TextMate.dmg
          if-no-files-found: error
