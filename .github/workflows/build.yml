name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Setup
      run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg

    - name: Configure
      run: ./configure

    - name: Build and Assemble
      run: |
        # 使用 ninja 编译全部目标（包括内置框架和依赖项）
        ninja
        
        # 顺便执行 TextMate 自带的打包/激活脚本（如果存在的话）
        # TextMate 源码根目录或 bin 目录下通常有类如驻留、链接的脚本
        # 如果 ninja 完后 Applications 目录已经好了，我们直接用它

    - name: Create DMG
      run: |
        echo "=== 寻找编译生成的最终 App ==="
        # 寻找整个目录里真正的、由系统编译生成的 TextMate.app
        # TextMate 官方构建通常会把完整的 App 放在如下路径之一：
        # 1. Applications/TextMate.app
        # 2. 从本地导出的某个安装目录
        
        APP_PATH=""
        if [ -d "Applications/TextMate.app" ]; then
          APP_PATH="Applications/TextMate.app"
        elif [ -d "Applications/TextMate" ]; then
          # 如果名字没带后缀，帮它重命名，以便系统识别为 App Bundle
          mv Applications/TextMate Applications/TextMate.app
          APP_PATH="Applications/TextMate.app"
        fi
        
        if [ -z "$APP_PATH" ]; then
          # 最后的兜底搜索
          APP_PATH=$(find . -name "TextMate.app" -type d -not -path "*/.git/*" | head -n 1)
        fi

        if [ -z "$APP_PATH" ]; then
          echo "❌ 错误：仍未找到生成的 TextMate.app，请检查编译产物。"
          exit 1
        fi

        echo "✨ 找到目标 App 路径: $APP_PATH"
        
        # 临时的自签名（Ad-hoc），防止运行时提示“已损坏”
        echo "=== 正在执行本地自签名 ==="
        codesign --force --deep --sign - "$APP_PATH"

        # 使用 create-dmg 进行美化打包
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "$APP_PATH"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate-Mac-DMG
        path: TextMate.dmg
