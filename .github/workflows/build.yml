name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          brew --version
          brew --prefix

      - name: Install dependencies
        run: |
          brew install \
            boost \
            capnp \
            google-sparsehash \
            multimarkdown \
            ninja \
            ragel

      - name: Configure
        run: ./configure

      - name: Build
        run: |
          ninja -j$(sysctl -n hw.logicalcpu) TextMate

      # =========================
      # Find app (auto detect path)
      # =========================
      - name: Locate TextMate.app
        run: |
          find . -name "TextMate.app" -maxdepth 6 || true

      # =========================
      # Upload artifact
      # =========================
      - name: Upload TextMate.app
        uses: actions/upload-artifact@v4
        with:
          name: TextMate
          path: |
            **/TextMate.app
