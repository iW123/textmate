name: MacOS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CC: ccache clang
      CXX: ccache clang++

    steps:
      # ========================
      # Checkout
      # ========================
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ========================
      # Homebrew cache
      # ========================
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/opt
          key: brew-${{ runner.os }}-textmate

      # ========================
      # ccache cache
      # ========================
      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      # ========================
      # Install deps
      # ========================
      - name: Install dependencies
        run: |
          brew update
          brew install boost capnp google-sparsehash multimarkdown ninja ragel ccache

      # ⭐⭐⭐关键修复：PATH
      - name: Setup PATH
        run: |
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix)/sbin" >> $GITHUB_PATH

      # ========================
      # Debug (防止再踩坑)
      # ========================
      - name: Debug tools
        run: |
          which ragel
          ragel --version
          which ninja
          which ccache

      # ========================
      # Configure
      # ========================
      - name: Configure
        run: |
          ./configure

      # ========================
      # Build
      # ========================
      - name: Build
        run: |
          export PATH="$(brew --prefix)/bin:$PATH"
          ninja -j$(sysctl -n hw.ncpu) TextMate

      # ========================
      # Artifact
      # ========================
      - name: Upload TextMate.app
        uses: actions/upload-artifact@v4
        with:
          name: TextMate
          path: |
            **/TextMate.app
