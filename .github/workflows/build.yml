name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Setup
      run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg

    - name: Configure
      run: ./configure

    - name: Build
      run: |
        # 执行编译，这会将完整的、符合苹果规范的 TextMate.app 生成到 ~/build/ 目录下
        ninja

    - name: Create DMG
      run: |
        echo "=== 开始全盘搜寻 TextMate 编译产物 ==="
        
        # 1. 创建打包源目录
        mkdir -p dmg_source
        
        # 2. 地毯式精准搜索名为 TextMate.app 的目录（忽略缓存和依赖库）
        # 搜索范围包括：当前工作目录、家目录、以及系统的整个 build 空间
        REAL_APP=$(find . $HOME -name "TextMate.app" -type d -not -path "*/.git/*" -not -path "*/.deps/*" 2>/dev/null | head -n 1)
        
        # 3. 如果没找到带 .app 的，尝试寻找不带后缀但属于目录的 TextMate
        if [ -z "$REAL_APP" ]; then
          REAL_APP=$(find . $HOME -name "TextMate" -type d -not -path "*/.git/*" -not -path "*/.deps/*" 2>/dev/null | head -n 1)
        fi
        
        # 4. 如果还是找不到，说明它可能只生成了裸二进制文件，打印当前目录结构供排查
        if [ -z "$REAL_APP" ]; then
          echo "⚠️ 未能自动识别到 App 目录，正在为您打印当前编译输出的所有文件结构... 🔍"
          echo "=== 根目录文件列表 ==="
          ls -la
          echo "=== Applications 目录内容 ==="
          ls -la Applications/ 2>/dev/null || echo "无 Applications 目录"
          echo "=== ~/build 目录内容 ==="
          ls -la $HOME/build/ 2>/dev/null || echo "无 ~/build 目录"
          
          echo "❌ 终极报错：未能捕获到合规的 TextMate 目标，请在 Actions 日志中查看上方打印的文件列表。"
          exit 1
        fi
        
        echo "✨ 成功捕获到编译目标: $REAL_APP"
        
        # 5. 如果抓到的是纯二进制文件而不是 macOS 标准 Bundle 结构
        if [ ! -d "$REAL_APP/Contents" ]; then
          echo "📦 检测到目标为非标准结构，正在为您自动拼装 macOS 标准 App 骨架..."
          mkdir -p dmg_source/TextMate.app/Contents/MacOS
          mkdir -p dmg_source/TextMate.app/Contents/Resources
          
          # 将捕获的文件/文件夹挪入核心
          cp -a "$REAL_APP"/* dmg_source/TextMate.app/Contents/MacOS/ 2>/dev/null || cp -a "$REAL_APP" dmg_source/TextMate.app/Contents/MacOS/TextMate
          
          # 顺便把同级可能存在的 Frameworks 和 PlugIns 捎带进去
          [ -d "Frameworks" ] && mkdir -p dmg_source/TextMate.app/Contents/Frameworks && cp -a Frameworks/* dmg_source/TextMate.app/Contents/Frameworks/
          [ -d "PlugIns" ] && mkdir -p dmg_source/TextMate.app/Contents/PlugIns && cp -a PlugIns/* dmg_source/TextMate.app/Contents/PlugIns/
          
          # 补齐基础 Info.plist
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>TextMate</string><key>CFBundleIdentifier</key><string>com.textmate.TextMate</string><key>CFBundleName</key><string>TextMate</string><key>CFBundlePackageType</key><string>APPL</string></dict></plist>' > dmg_source/TextMate.app/Contents/Info.plist
        else
          # 如果本身就是完整的 .app，直接复制过去
          cp -a "$REAL_APP" dmg_source/
        fi

        # 6. 本地自签名
        codesign --force --deep --sign - "dmg_source/TextMate.app" || echo "⚠️ 签名失败，跳过签名直接打包"
        
        # 7. 美化打包
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "dmg_source/TextMate.app"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate-Mac-DMG
        path: TextMate.dmg
