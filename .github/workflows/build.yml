name: MacOS

on:
  # push:
  # pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup
      run: |
        # 额外安装 macos-dylibbundler 用于修复外部依赖动态库
        brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg dylibbundler

    - name: Configure
      run: |
        PREFIX="$(brew --prefix)"
        cat > local.rave <<EOF
        add FLAGS "-I${PREFIX}/include"
        add LN_FLAGS "-L${PREFIX}/lib"
        EOF
        # 强制指定当前机器的 native 架构编译（Actions 现在的 macOS-latest 为 Apple Silicon）
        export CFLAGS="-target arm64-apple-macos"
        export CXXFLAGS="-target arm64-apple-macos"
        ./configure

    - name: Build
      run: ninja

    - name: Create DMG & Fix Dependencies
      run: |
        echo "=== 提取并规范化 TextMate.app ==="
        mkdir -p dmg_source
        
        # 1. 寻找编译出的原始目标并迁移
        REAL_APP=$(find . $HOME -name "TextMate.app" -type d -not -path "*/.git/*" -not -path "*/.deps/*" 2>/dev/null | head -n 1)
        
        if [ -z "$REAL_APP" ] && [ -d "Applications/TextMate" ]; then
          mkdir -p dmg_source/TextMate.app/Contents/MacOS
          cp -a Applications/TextMate dmg_source/TextMate.app/Contents/MacOS/TextMate
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>TextMate</string><key>CFBundleIdentifier</key><string>com.textmate.TextMate</string><key>CFBundleName</key><string>TextMate</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>2.0</string></dict></plist>' > dmg_source/TextMate.app/Contents/Info.plist
        else
          cp -a "$REAL_APP" dmg_source/
        fi

        # 2. 增强版补丁：深度修复所有依赖项
        echo "=== 正在封装内部动态链接库... ==="
        mkdir -p dmg_source/TextMate.app/Contents/Frameworks
        
        # 核心改动：
        # -b: 自动重写主二进制文件
        # -x: 指定主二进制文件路径
        # -d: 拷贝 .dylib 到该目录
        # -p: 关键！指示二进制文件以相对路径去加载这些库
        # 额外增加查找：因为 TextMate 包含很多支持库，我们需要让 dylibbundler 顺藤摸瓜
        dylibbundler -od -b \
          -x dmg_source/TextMate.app/Contents/MacOS/TextMate \
          -d dmg_source/TextMate.app/Contents/Frameworks/ \
          -p @executable_path/../Frameworks/

        # 【可选安全保障】深度遍历检测：如果 TextMate 内部有独立生成的其他二进制/动态库，顺带一并修复
        find dmg_source/TextMate.app -type f \( -name "*.dylib" -o -name "*.so" \) 2>/dev/null | while read -r lib; do
          dylibbundler -od -x "$lib" -d dmg_source/TextMate.app/Contents/Frameworks/ -p @executable_path/../Frameworks/ || true
        done

        # 3. 彻底清除隔离标记并重新进行临时的深度自签名
        # 注意：由于修改了内部的库和路径，必须在所有 dylib 修改完成后进行【最深度的自签名】
        echo "=== 正在应用核心签名补丁 ==="
        xattr -cr dmg_source/TextMate.app || true
        
        # 使用 --deep 和最高权限重签所有修改过的库
        find dmg_source/TextMate.app/Contents/Frameworks -type f -name "*.dylib" 2>/dev/null | while read -r dylib; do
          codesign --force --sign - "$dylib"
        done
        codesign --force --deep --sign - dmg_source/TextMate.app

        # 4. 生成 DMG
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "dmg_source/TextMate.app"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate
        path: TextMate.dmg
