name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
  
      - name: Setup
        # 在 brew install 中加上 create-dmg
        run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg
  
      - name: Configure
        run: ./configure
  
      - name: Build
        run: ninja TextMate

      # ====== 完整组装并打包成 DMG ======
      - name: Package Pretty DMG
        run: |
          echo "=== 开始组装完整的 TextMate.app ==="
          
          # 1. 创建标准的临时打包源目录
          mkdir -p dmg_source
          
          # 2. 将主程序复制进去，并确保命名为 TextMate.app
          # 兼容处理：无论它原本叫 TextMate 还是 TextMate.app
          TARGET_NAME=$(ls Applications/ | head -n 1)
          cp -R "Applications/$TARGET_NAME" "dmg_source/TextMate.app"
          
          # 3. 拼装核心依赖：把外部的 Frameworks 和 PlugIns 塞进 App 内部结构中
          # 标准 Mac App 的内部结构是：TextMate.app/Contents/Frameworks/ 
          echo "正在注入 Frameworks 和 PlugIns 到 App 内部..."
          mkdir -p "dmg_source/TextMate.app/Contents/Frameworks"
          mkdir -p "dmg_source/TextMate.app/Contents/PlugIns"
          
          if [ -d "Frameworks" ]; then
            cp -R Frameworks/* "dmg_source/TextMate.app/Contents/Frameworks/"
          fi
          
          if [ -d "PlugIns" ]; then
            cp -R PlugIns/* "dmg_source/TextMate.app/Contents/PlugIns/"
          fi
  
          # 4. 验证 App 结构是否完整
          echo "=== 组装后的 App 内部结构 ==="
          ls -la "dmg_source/TextMate.app/Contents"
          
          # 5. 执行 create-dmg 美化打包
          create-dmg \
            --volname "TextMate Installation" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TextMate.app" 175 120 \
            --app-drop-link 425 120 \
            --hide-extension "TextMate.app" \
            "TextMate.dmg" \
            "dmg_source/TextMate.app"
  
      # ====== 上传产物 ======
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextMate-Mac-DMG
          path: TextMate.dmg
          
