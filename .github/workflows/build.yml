name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Setup
      run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg

    - name: Configure
      run: ./configure

    - name: Build and Install to Local Directory
      run: |
        # 1. 编译全部项目
        ninja
        
        # 2. 调用 TextMate 官方自带的安装/组装脚本（通常在 bin 目录下）
        # 这个脚本会将二进制、Frameworks、PlugIns 和本地化资源完美融合到一个真正的 TextMate.app 中
        # 它会默认把组装好的完整 App 输出到根目录的 ~/Applications/ 或指定的 build 目录
        if [ -f "bin/create_app" ]; then
          ./bin/create_app
        elif [ -f "bin/install" ]; then
          ./bin/install
        else
          # 如果没有找到独立脚本，尝试寻找 ninja 自身集成的安装目标
          ninja install || echo "No explicit install target"
        fi

    - name: Create DMG
      run: |
        echo "=== 寻找由官方脚本组装出来的真正 App ==="
        
        # 1. 全局搜索真正符合格式的 TextMate.app
        # 官方脚本组装完后，通常会放在系统的 ~/Applications 或当前目录的某个地方
        REAL_APP=$(find ~/Applications . -name "TextMate.app" -type d -maxdepth 4 2>/dev/null | head -n 1)
        
        if [ -z "$REAL_APP" ]; then
          echo "❌ 无法通过官方脚本找到组装好的 TextMate.app，开始最后一步强制修复..."
          # 如果实在找不到，我们将 Applications 里的文件通过普通的 zip/unzip 刷新一层元数据再试
          mkdir -p final_source
          cp -a Applications/* final_source/ 2>/dev/null || cp -a bin/* final_source/ 2>/dev/null
          REAL_APP="final_source"
        fi
        
        echo "✨ 确定打包源路径: $REAL_APP"
        
        # 2. 如果它具备标准结构，尝试签名。如果报错，直接跳过签名（DMG 依然可以打包）
        codesign --force --deep --sign - "$REAL_APP" || echo "⚠️ 签名失败，跳过签名直接打包..."

        # 3. 使用 create-dmg 进行美化打包
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "$REAL_APP"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate-Mac-DMG
        path: TextMate.dmg
