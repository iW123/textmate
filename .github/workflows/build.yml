name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
  
      - name: Setup
        # 在 brew install 中加上 create-dmg
        run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg
  
      - name: Configure
        run: ./configure
  
      - name: Build
        run: ninja TextMate

      # ====== 标准 macOS App 结构组装与签名 ======
      - name: Package Pretty DMG
        run: |
          echo "=== 深入分析编译产物结构 ==="
          # 1. 创建符合苹果标准的 Bundle 目录结构
          mkdir -p dmg_source/TextMate.app/Contents/MacOS
          mkdir -p dmg_source/TextMate.app/Contents/Resources
          mkdir -p dmg_source/TextMate.app/Contents/Frameworks
          mkdir -p dmg_source/TextMate.app/Contents/PlugIns
  
          # 2. 智能识别并归位核心可执行文件
          # 看看 Applications 里到底是什么
          RAW_TARGET=$(ls Applications/ | head -n 1)
          
          if [ -d "Applications/$RAW_TARGET/Contents" ]; then
            echo "检测到编译产物本身已具备部分 App 结构，正在完整迁移..."
            cp -a "Applications/$RAW_TARGET/Contents/"* "dmg_source/TextMate.app/Contents/"
          else
            echo "检测到编译产物为裸文件/不完整目录，进行标准结构化注入..."
            # 将核心可执行文件/目录放入 MacOS
            cp -a "Applications/$RAW_TARGET/"* "dmg_source/TextMate.app/Contents/MacOS/" 2>/dev/null || cp -a "Applications/$RAW_TARGET" "dmg_source/TextMate.app/Contents/MacOS/TextMate"
          fi
  
          # 3. 注入外部依赖的共享库
          if [ -d "Frameworks" ] && [ "$(ls -A Frameworks)" ]; then
            cp -a Frameworks/* "dmg_source/TextMate.app/Contents/Frameworks/"
          fi
          if [ -d "PlugIns" ] && [ "$(ls -A PlugIns)" ]; then
            cp -a PlugIns/* "dmg_source/TextMate.app/Contents/PlugIns/"
          fi
          if [ -d "Shared" ] && [ "$(ls -A Shared)" ]; then
            # TextMate 的资源文件通常在 Shared 目录，将其归位到 Resources
            cp -a Shared/* "dmg_source/TextMate.app/Contents/Resources/"
          fi
  
          # 4. 关键：如果没有 Info.plist，苹果拒绝签名。我们检查并尝试补一个基础的 Info.plist
          if [ ! -f "dmg_source/TextMate.app/Contents/Info.plist" ]; then
            echo "⚠️ 缺少 Info.plist，正在自动生成基础合规元数据..."
            cat <<EOF > "dmg_source/TextMate.app/Contents/Info.plist"
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
                  <key>CFBundleDevelopmentRegion</key>
                  <string>en</string>
                  <key>CFBundleExecutable</key>
                  <string>TextMate</string>
                  <key>CFBundleIdentifier</key>
                  <string>com.textmate.TextMate</string>
                  <key>CFBundleInfoDictionaryVersion</key>
                  <string>6.0</string>
                  <key>CFBundleName</key>
                  <string>TextMate</string>
                  <key>CFBundlePackageType</key>
                  <string>APPL</string>
                  <key>CFBundleShortVersionString</key>
                  <string>2.0</string>
                  <key>CFBundleSignature</key>
                  <string>TxMt</string>
              </dict>
              </plist>
              EOF
                      fi
  
          # 5. 执行自签名（此时结构已合法，不会再报 bundle format 错误）
          echo "=== 正在执行 Ad-hoc 签名 ==="
          codesign --force --deep --sign - "dmg_source/TextMate.app"
  
          # 6. 使用 create-dmg 打包
          create-dmg \
            --volname "TextMate Installation" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TextMate.app" 175 120 \
            --app-drop-link 425 120 \
            --hide-extension "TextMate.app" \
            "TextMate.dmg" \
            "dmg_source/TextMate.app"
  
      # ====== 上传产物 ======
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextMate-Mac-DMG
          path: TextMate.dmg
          
