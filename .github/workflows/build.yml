name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
  
      - name: Setup
        # 在 brew install 中加上 create-dmg
        run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg
  
      - name: Configure
        run: ./configure
  
      - name: Build
        run: ninja TextMate
  
      # ====== 新增：美化打包 DMG ======
      - name: Package Pretty DMG
        run: |
          # 1. 定位编译好的 App 路径（根据具体打包输出调整）
          APP_PATH="build/TextMate.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="TextMate.app"
          fi
          
          # 2. 使用 create-dmg 进行美化打包
          create-dmg \
            --volname "TextMate Installation" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TextMate.app" 175 120 \
            --app-drop-link 425 120 \
            --hide-extension "TextMate.app" \
            "TextMate.dmg" \
            "$APP_PATH"
  
      # ====== 新增：上传产物 ======
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextMate-Pretty-DMG
          path: TextMate.dmg
