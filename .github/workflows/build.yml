name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup
      run: |
        # 额外安装 macos-dylibbundler 用于修复外部依赖动态库
        brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg dylibbundler

    - name: Configure
      run: |
        PREFIX="$(brew --prefix)"
        cat > local.rave <<EOF
        add FLAGS "-I${PREFIX}/include"
        add LN_FLAGS "-L${PREFIX}/lib"
        EOF
        # 强制指定当前机器的 native 架构编译（Actions 现在的 macOS-latest 为 Apple Silicon）
        export CFLAGS="-target arm64-apple-macos"
        export CXXFLAGS="-target arm64-apple-macos"
        ./configure

    - name: Build
      run: ninja

    - name: Create DMG & Fix Dependencies
      run: |
        echo "=== Locate built TextMate.app ==="
        mkdir -p dmg_source

        REAL_APP=$(find . $HOME -name "TextMate.app" -type d -not -path "*/.git/*" -not -path "*/.deps/*" 2>/dev/null | head -n 1)

        if [ -z "$REAL_APP" ] && [ -d "Applications/TextMate" ]; then
          echo "Using fallback Applications/TextMate"
          mkdir -p dmg_source/TextMate.app/Contents/MacOS
          cp -a Applications/TextMate dmg_source/TextMate.app/Contents/MacOS/TextMate

          cat > dmg_source/TextMate.app/Contents/Info.plist <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>CFBundleExecutable</key><string>TextMate</string>
              <key>CFBundleIdentifier</key><string>com.textmate.TextMate</string>
              <key>CFBundleName</key><string>TextMate</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>2.0</string>
            </dict>
            </plist>
            EOF
        else
          echo "Copying REAL_APP: $REAL_APP"
          cp -a "$REAL_APP" dmg_source/
        fi

        APP="dmg_source/TextMate.app"

        echo "=== Clean quarantine attributes ==="
        xattr -cr "$APP" || true

        echo "=== Collect all Mach-O binaries ==="
        BINS=$(find "$APP" -type f | while read f; do file "$f" | grep -q "Mach-O" && echo "$f"; done)

        echo "=== Bundling dependencies (Frameworks) ==="
        mkdir -p "$APP/Contents/Frameworks"

        for bin in $BINS; do
          echo "Processing: $bin"
          dylibbundler -od -b -x "$bin" -d "$APP/Contents/Frameworks/" || true
        done

        echo "=== Fixing capnp path issues (libs -> Frameworks compatibility) ==="
        for bin in $BINS; do
          otool -L "$bin" | grep capnp | awk '{print $1}' | while read lib; do
            [ -z "$lib" ] && continue
            install_name_tool -change \
              "$lib" \
              "@executable_path/../Frameworks/$(basename $lib)" \
              "$bin" || true
          done
        done

        echo "=== Re-signing app (ad-hoc, CI-safe) ==="
        codesign --force --deep --sign - "$APP" || true

        echo "=== Building DMG ==="
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "$APP"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate
        path: TextMate.dmg
