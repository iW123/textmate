name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Setup
      run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg

    - name: Configure
      run: ./configure

    - name: Build and Assemble
      run: |
        # 使用 ninja 编译全部目标（包括内置框架和依赖项）
        ninja
        
        # 顺便执行 TextMate 自带的打包/激活脚本（如果存在的话）
        # TextMate 源码根目录或 bin 目录下通常有类如驻留、链接的脚本
        # 如果 ninja 完后 Applications 目录已经好了，我们直接用它

    - name: Create DMG
      run: |
        echo "=== 开始规范化组装真正的 TextMate.app Bundle ==="
        
        # 1. 建立符合苹果官方标准的 App 目录结构
        mkdir -p dmg_source/TextMate.app/Contents/MacOS
        mkdir -p dmg_source/TextMate.app/Contents/Frameworks
        mkdir -p dmg_source/TextMate.app/Contents/PlugIns
        mkdir -p dmg_source/TextMate.app/Contents/Resources

        # 2. 将二进制文件放入它该去的 MacOS 目录，并重命名为 TextMate
        if [ -d "Applications/TextMate.app" ]; then
          # 如果它是个目录，把里面的东西拷过去
          cp -a Applications/TextMate.app/* dmg_source/TextMate.app/Contents/MacOS/ 2>/dev/null || cp -a Applications/TextMate.app dmg_source/TextMate.app/Contents/MacOS/TextMate
        else
          # 如果它是个纯文件
          cp -a Applications/TextMate dmg_source/TextMate.app/Contents/MacOS/TextMate 2>/dev/null || cp -a Applications/TextMate.app dmg_source/TextMate.app/Contents/MacOS/TextMate
        fi

        # 3. 把散落在根目录的依赖库和插件移入 App 内部
        if [ -d "Frameworks" ]; then
          cp -a Frameworks/* dmg_source/TextMate.app/Contents/Frameworks/
        fi
        if [ -d "PlugIns" ]; then
          cp -a PlugIns/* dmg_source/TextMate.app/Contents/PlugIns/
        fi
        if [ -d "Shared" ]; then
          cp -a Shared/* dmg_source/TextMate.app/Contents/Resources/
        fi

        # 4. 创建合法的 Info.plist（用 printf 规避 EOF 语法错误）
        printf '%s\n' \
        '<?xml version="1.0" encoding="UTF-8"?>' \
        '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
        '<plist version="1.0">' \
        '<dict>' \
        '    <key>CFBundlePackageType</key><string>APPL</string>' \
        '    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>' \
        '    <key>CFBundleName</key><string>TextMate</string>' \
        '    <key>CFBundleExecutable</key><string>TextMate</string>' \
        '    <key>CFBundleIdentifier</key><string>com.textmate.TextMate</string>' \
        '    <key>CFBundleShortVersionString</key><string>2.0</string>' \
        '    <key>CFBundleSignature</key><string>TxMt</string>' \
        '</dict>' \
        '</plist>' > dmg_source/TextMate.app/Contents/Info.plist

        echo "=== 检查最终组装结构 ==="
        ls -R dmg_source/TextMate.app/Contents

        # 5. 现在的结构完全合法，执行自签名
        echo "=== 正在执行本地自签名 ==="
        codesign --force --deep --sign - "dmg_source/TextMate.app"

        # 6. 使用 create-dmg 进行美化打包
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "dmg_source/TextMate.app"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate-Mac-DMG
        path: TextMate.dmg
