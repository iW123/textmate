name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Setup
      run: brew install boost capnp google-sparsehash multimarkdown ninja ragel create-dmg

    - name: Configure
      run: ./configure

    - name: Build
      run: |
        # 执行编译，这会将完整的、符合苹果规范的 TextMate.app 生成到 ~/build/ 目录下
        ninja

    - name: Create DMG
      run: |
        echo "=== 从 ~/build 目录提取官方生成的完整 App ==="
        
        # 1. 创建干净的临时打包源目录
        mkdir -p dmg_source
        
        # 2. 从真实输出位置 ~/build/ 复制完整的 TextMate.app
        # 根据 TextMate 习惯，它可能在 ~/build/Applications/ 或直接在 ~/build/
        if [ -d "$HOME/build/Applications/TextMate.app" ]; then
          cp -a "$HOME/build/Applications/TextMate.app" dmg_source/
        elif [ -d "$HOME/build/TextMate.app" ]; then
          cp -a "$HOME/build/TextMate.app" dmg_source/
        else
          # 如果路径有微调，全局搜索 ~/build 目录
          echo "⚠️ 正在 ~/build 中精准搜索 TextMate.app..."
          FOUND_PATH=$(find $HOME/build -name "TextMate.app" -type d -maxdepth 3 2>/dev/null | head -n 1)
          if [ -n "$FOUND_PATH" ]; then
            cp -a "$FOUND_PATH" dmg_source/
          else
            echo "❌ 严重错误：在 ~/build 中未找到 TextMate.app，请检查编译日志！"
            exit 1
          fi
        fi

        # 3. 现在的 App 是官方标准组装好的，直接进行本地临时的深度自签名（防止下载后提示损坏）
        echo "=== 正在执行本地自签名 ==="
        codesign --force --deep --sign - "dmg_source/TextMate.app" || echo "⚠️ 签名失败，跳过签名直接打包..."

        # 4. 使用 create-dmg 进行美化打包
        create-dmg \
          --volname "TextMate Installation" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TextMate.app" 175 120 \
          --app-drop-link 425 120 \
          --hide-extension "TextMate.app" \
          "TextMate.dmg" \
          "dmg_source/TextMate.app"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TextMate-Mac-DMG
        path: TextMate.dmg
