name: MacOS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          brew --version
          brew --prefix

      - name: Install dependencies
        run: |
          brew install \
            boost \
            capnp \
            google-sparsehash \
            multimarkdown \
            ninja \
            ragel

      - name: Configure
        run: ./configure

      - name: Build
        run: |
          ninja -j$(sysctl -n hw.logicalcpu) TextMate

      - name: Create DMG
        run: |
          brew install create-dmg

          echo "Searching for TextMate.app..."

          APP_PATH=$(find . -maxdepth 12 -name "TextMate.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "⚠️ No .app found, fallback to binary packaging"

            BIN_PATH=$(find . -maxdepth 12 -name "TextMate" | head -n 1)

            if [ -z "$BIN_PATH" ]; then
              echo "❌ No build output found at all"
              exit 1
            fi

            mkdir -p dist/TextMate.app/Contents/MacOS
            cp "$BIN_PATH" dist/TextMate.app/Contents/MacOS/TextMate
          else
            mkdir -p dist
            cp -R "$APP_PATH" dist/
          fi

          create-dmg \
            --volname "TextMate" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "TextMate.dmg" \
            "dist/"

      # =========================
      # Upload artifact (修复核心)
      # =========================
      - name: Upload TextMate artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextMate
          path: TextMate.dmg
          if-no-files-found: error
